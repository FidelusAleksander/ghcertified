name: Auto Translate UI Strings
run-name: Auto translate UI strings from ${{ github.sha }}

on:
  push:
    branches:
      - main
    paths:
      - "app/messages/en.json"

permissions:
  contents: write
  pull-requests: write
  models: read

jobs:
  translate:
    strategy:
      max-parallel: 1
      matrix:
        language:
          [
            { code: "pt", name: "Portuguese" },
            { code: "pl", name: "Polish" },
            { code: "es", name: "Spanish" },
            { code: "ja", name: "Japanese" },
          ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build System Prompt
        id: build-system-prompt
        uses: skills/action-text-variables@fd62a3a36b6906b574d3cbd7793bf75219aa7318 # v3.0.1
        with:
          template-file: .github/ui-translation-system-prompt.md
          template-vars: |
            targetLanguage: ${{ matrix.language.name }}

      - name: Translate en.json
        uses: FidelusAleksander/prompt-action@316913653188307cbd0261878e4f8056324bc40c # v1.2.1
        id: translate
        with:
          system-prompt: ${{ steps.build-system-prompt.outputs.updated-text }}
          prompt-file: app/messages/en.json

      - name: Save translation
        run: |
          echo "$TRANSLATED_TEXT" > "app/messages/${{ matrix.language.code }}.json"
        env:
          TRANSLATED_TEXT: ${{ steps.translate.outputs.text }}

      - name: Commit changes
        uses: EndBug/add-and-commit@290ea2c423ad77ca9c62ae0f5b224379612c0321 # v10.0.0
        with:
          add: "app/messages/${{ matrix.language.code }}.json"
          message: "i18n: translate UI strings to ${{ matrix.language.name }}"
          push: true
          new_branch: i18n/auto-translate-ui-${{ github.sha }}

  create-pr:
    needs: translate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "i18n: auto-translate UI strings" \
            --body "This PR updates UI translations for all locales based on changes to \`app/messages/en.json\` from commit ${{ github.sha }}." \
            --base main \
            --head i18n/auto-translate-ui-${{ github.sha }}
