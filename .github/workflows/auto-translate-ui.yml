name: Auto Translate UI Strings
run-name: Auto translate UI strings from ${{ github.sha }}

on:
  push:
    branches:
      - main
    paths:
      - "app/messages/en.json"

permissions:
  contents: write
  pull-requests: write
  models: read

jobs:
  translate:
    strategy:
      max-parallel: 1
      matrix:
        language:
          [
            { code: "pt", name: "Portuguese" },
            { code: "pl", name: "Polish" },
            { code: "es", name: "Spanish" },
            { code: "ja", name: "Japanese" },
          ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build System Prompt
        id: build-system-prompt
        uses: skills/action-text-variables@4409ce6819131b716e644291b7cf59bfcfe9db82 # v4.0.0
        with:
          template-file: .github/ui-translation-system-prompt.md
          template-vars: |
            targetLanguage: ${{ matrix.language.name }}

      - name: Translate en.json
        uses: FidelusAleksander/prompt-action@5fd22d9e053d49a91cc7d014eddd622bf66b43ad # v2.0.0
        id: translate
        with:
          system-prompt: ${{ steps.build-system-prompt.outputs.updated-text }}
          prompt-file: app/messages/en.json

      - name: Save translation
        run: |
          echo "$TRANSLATED_TEXT" > "app/messages/${{ matrix.language.code }}.json"
        env:
          TRANSLATED_TEXT: ${{ steps.translate.outputs.text }}

      - name: Commit changes
        uses: EndBug/add-and-commit@290ea2c423ad77ca9c62ae0f5b224379612c0321 # v10.0.0
        with:
          add: "app/messages/${{ matrix.language.code }}.json"
          message: "i18n: translate UI strings to ${{ matrix.language.name }}"
          push: true
          new_branch: i18n/auto-translate-ui-${{ github.sha }}

  create-pr:
    needs: translate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      # Generate a GitHub App token for PR creation so that downstream workflows
      # (e.g. pr-checks) are triggered. PRs created with the default GITHUB_TOKEN
      # do not trigger subsequent workflow runs.
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.AUTO_TRANSLATE_APP_CLIENT_ID }}
          private-key: ${{ secrets.AUTO_TRANSLATE_APP_PRIVATE_KEY }}
      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh pr create \
            --title "i18n: auto-translate UI strings" \
            --body "This PR updates UI translations for all locales based on changes to \`app/messages/en.json\` from commit ${{ github.sha }}." \
            --label translations \
            --base main \
            --head i18n/auto-translate-ui-${{ github.sha }}

          gh pr merge --auto --squash i18n/auto-translate-ui-${{ github.sha }}
